<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Report Pro - Standalone</title>
    
    <!-- Tailwind CSS 3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        /* Simple animations for standalone version */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            PlusCircle, 
            Trash2, 
            DollarSign, 
            Clock, 
            AlertCircle, 
            TrendingUp,
            Calendar,
            Briefcase
        } = LucideReact;

        const DEFAULT_EXCHANGE_RATE = 26320;

        function App() {
            const [reports, setReports] = useState([]);
            const [jobType, setJobType] = useState('GDO');
            const [queue, setQueue] = useState('None');
            const [hours, setHours] = useState('');
            const [description, setDescription] = useState('');
            const [exchangeRate, setExchangeRate] = useState(DEFAULT_EXCHANGE_RATE);
            const [lastRateUpdate, setLastRateUpdate] = useState('18/03/2026');
            
            const [chiveLimit, setChiveLimit] = useState(20);
            const [auditLimit, setAuditLimit] = useState(15);
            const [showLimitsConfig, setShowLimitsConfig] = useState(false);

            // Fetch Exchange Rate
            useEffect(() => {
                const fetchRate = async () => {
                    try {
                        const response = await fetch('https://open.er-api.com/v6/latest/USD');
                        const data = await response.json();
                        if (data && data.rates && data.rates.VND) {
                            const rate = data.rates.VND;
                            setExchangeRate(rate);
                            const date = new Date(data.time_last_update_unix * 1000);
                            const dateStr = date.toLocaleDateString('vi-VN');
                            setLastRateUpdate(dateStr);
                            localStorage.setItem('job_exchange_rate', JSON.stringify({ rate, date: dateStr }));
                        }
                    } catch (error) {
                        console.error("Failed to fetch exchange rate", error);
                    }
                };
                fetchRate();
            }, []);

            // Load data from localStorage
            useEffect(() => {
                const savedReports = localStorage.getItem('job_reports');
                const savedLimits = localStorage.getItem('job_limits');
                const savedRate = localStorage.getItem('job_exchange_rate');
                
                if (savedReports) {
                    try { setReports(JSON.parse(savedReports)); } catch (e) {}
                }
                if (savedLimits) {
                    try {
                        const { chive, audit } = JSON.parse(savedLimits);
                        setChiveLimit(chive || 20);
                        setAuditLimit(audit || 15);
                    } catch (e) {}
                }
                if (savedRate) {
                    try {
                        const { rate, date } = JSON.parse(savedRate);
                        setExchangeRate(rate);
                        setLastRateUpdate(date);
                    } catch (e) {}
                }
            }, []);

            // Save data
            useEffect(() => {
                localStorage.setItem('job_reports', JSON.stringify(reports));
            }, [reports]);

            useEffect(() => {
                localStorage.setItem('job_limits', JSON.stringify({ chive: chiveLimit, audit: auditLimit }));
            }, [chiveLimit, auditLimit]);

            const handleAddReport = () => {
                if (!hours || parseFloat(hours) <= 0) return;
                const rate = jobType === 'GDO' ? 3.6 : 2.0;
                const h = parseFloat(hours);
                const newReport = {
                    id: Date.now().toString(),
                    date: new Date().toISOString(),
                    jobType,
                    queue: jobType === 'Chive' ? queue : 'None',
                    hours: h,
                    description,
                    rate,
                    totalUsd: h * rate,
                };
                setReports([newReport, ...reports]);
                setHours('');
                setDescription('');
            };

            const deleteReport = (id) => {
                setReports(reports.filter(r => r.id !== id));
            };

            const handleClearData = () => {
                if (window.confirm("Bạn có chắc chắn muốn xóa toàn bộ dữ liệu không?")) {
                    setReports([]);
                    setChiveLimit(20);
                    setAuditLimit(15);
                    localStorage.clear();
                    window.location.reload();
                }
            };

            const today = new Date().toISOString().split('T')[0];
            const dailyStats = useMemo(() => {
                const todayReports = reports.filter(r => r.date.startsWith(today));
                const gdoUsd = todayReports.filter(r => r.jobType === 'GDO').reduce((sum, r) => sum + r.totalUsd, 0);
                const chiveUsd = todayReports.filter(r => r.jobType === 'Chive').reduce((sum, r) => sum + r.totalUsd, 0);
                return {
                    gdo: { usd: gdoUsd, vnd: gdoUsd * exchangeRate },
                    chive: { usd: chiveUsd, vnd: chiveUsd * exchangeRate },
                    totalUsd: gdoUsd + chiveUsd,
                    hours: todayReports.reduce((sum, r) => sum + r.hours, 0)
                };
            }, [reports, today, exchangeRate]);

            const weeklyProgress = useMemo(() => {
                const now = new Date();
                const startOfWeek = new Date(now);
                startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
                startOfWeek.setHours(0, 0, 0, 0);
                const weeklyReports = reports.filter(r => new Date(r.date) >= startOfWeek);
                const chiveHours = weeklyReports.filter(r => r.jobType === 'Chive' && r.queue === 'Chive').reduce((sum, r) => sum + r.hours, 0);
                const auditHours = weeklyReports.filter(r => r.jobType === 'Chive' && r.queue === 'Audit').reduce((sum, r) => sum + r.hours, 0);
                return {
                    chive: { hours: chiveHours, limit: chiveLimit, percent: (chiveHours / chiveLimit) * 100 },
                    audit: { hours: auditHours, limit: auditLimit, percent: (auditHours / auditLimit) * 100 }
                };
            }, [reports, chiveLimit, auditLimit]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto space-y-6">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight text-slate-900">Job Report Pro</h1>
                                <p className="text-slate-500 mt-1">Quản lý báo cáo công việc và thu nhập hàng ngày</p>
                            </div>
                            <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-3">
                                <Calendar className="w-5 h-5 text-indigo-600" />
                                <span className="font-medium">{new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 md:col-span-2 fade-in">
                                <div className="flex items-center justify-between mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-emerald-50 rounded-xl"><DollarSign className="w-5 h-5 text-emerald-600" /></div>
                                        <span className="text-sm font-medium text-slate-500 uppercase tracking-wider">Thu nhập hôm nay</span>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-sm text-slate-400">Tổng cộng</div>
                                        <div className="text-xl font-bold text-slate-900">${dailyStats.totalUsd.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div className="p-4 bg-blue-50/50 rounded-2xl border border-blue-100">
                                        <div className="text-xs font-bold text-blue-600 uppercase mb-1">Job GDO</div>
                                        <div className="text-2xl font-bold text-slate-900">${dailyStats.gdo.usd.toFixed(2)}</div>
                                        <div className="text-sm font-medium text-blue-600">≈ {dailyStats.gdo.vnd.toLocaleString('vi-VN')} đ</div>
                                    </div>
                                    <div className="p-4 bg-purple-50/50 rounded-2xl border border-purple-100">
                                        <div className="text-xs font-bold text-purple-600 uppercase mb-1">Job Chive</div>
                                        <div className="text-2xl font-bold text-slate-900">${dailyStats.chive.usd.toFixed(2)}</div>
                                        <div className="text-sm font-medium text-purple-600">≈ {dailyStats.chive.vnd.toLocaleString('vi-VN')} đ</div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 fade-in" style={{animationDelay: '0.1s'}}>
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-indigo-50 rounded-xl"><TrendingUp className="w-5 h-5 text-indigo-600" /></div>
                                        <span className="text-sm font-medium text-slate-500 uppercase tracking-wider">Tiến độ tuần</span>
                                    </div>
                                    <button onClick={() => setShowLimitsConfig(!showLimitsConfig)} className="p-1.5 hover:bg-slate-100 rounded-lg transition-colors text-slate-400"><AlertCircle className="w-4 h-4" /></button>
                                </div>
                                {showLimitsConfig && (
                                    <div className="mb-4 p-3 bg-slate-50 rounded-xl border border-slate-200 space-y-3">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Chive Max</label>
                                                <input type="number" value={chiveLimit} onChange={(e) => setChiveLimit(parseFloat(e.target.value) || 0)} className="w-full px-2 py-1 text-sm border rounded bg-white" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Audit Max</label>
                                                <input type="number" value={auditLimit} onChange={(e) => setAuditLimit(parseFloat(e.target.value) || 0)} className="w-full px-2 py-1 text-sm border rounded bg-white" />
                                            </div>
                                        </div>
                                        <button onClick={handleClearData} className="w-full py-2 bg-red-50 text-red-600 text-[10px] font-bold uppercase rounded-lg">Xóa toàn bộ dữ liệu</button>
                                    </div>
                                )}
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold">
                                            <span className="text-slate-600 uppercase">Chive</span>
                                            <span className={weeklyProgress.chive.hours >= weeklyProgress.chive.limit ? 'text-red-500' : 'text-slate-900'}>{weeklyProgress.chive.hours.toFixed(1)} / {weeklyProgress.chive.limit}h</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className={`h-full rounded-full ${weeklyProgress.chive.percent >= 100 ? 'bg-red-500' : 'bg-indigo-500'}`} style={{width: `${Math.min(weeklyProgress.chive.percent, 100)}%`, transition: 'width 0.5s ease-out'}}></div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <div className="flex justify-between text-xs font-bold">
                                            <span className="text-slate-600 uppercase">Audit</span>
                                            <span className={weeklyProgress.audit.hours >= weeklyProgress.audit.limit ? 'text-red-500' : 'text-slate-900'}>{weeklyProgress.audit.hours.toFixed(1)} / {weeklyProgress.audit.limit}h</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                            <div className={`h-full rounded-full ${weeklyProgress.audit.percent >= 100 ? 'bg-red-500' : 'bg-purple-500'}`} style={{width: `${Math.min(weeklyProgress.audit.percent, 100)}%`, transition: 'width 0.5s ease-out'}}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-5">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 sticky top-8 fade-in" style={{animationDelay: '0.2s'}}>
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2"><PlusCircle className="w-5 h-5 text-indigo-600" />Thêm báo cáo</h2>
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Chọn Job</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                <button onClick={() => { setJobType('GDO'); setQueue('None'); }} className={`py-3 px-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-1 ${jobType === 'GDO' ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 bg-slate-50 text-slate-500'}`}>
                                                    <span className="font-bold">GDO</span>
                                                    <span className="text-[10px] uppercase opacity-70">$3.6/h</span>
                                                </button>
                                                <button onClick={() => { setJobType('Chive'); setQueue('Chive'); }} className={`py-3 px-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-1 ${jobType === 'Chive' ? 'border-indigo-600 bg-indigo-50 text-indigo-700' : 'border-slate-100 bg-slate-50 text-slate-500'}`}>
                                                    <span className="font-bold">Chive</span>
                                                    <span className="text-[10px] uppercase opacity-70">$2.0/h</span>
                                                </button>
                                            </div>
                                        </div>
                                        {jobType === 'Chive' && (
                                            <div className="space-y-2">
                                                <label className="block text-sm font-semibold text-slate-700">Chọn Queue</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {['Chive', 'Audit'].map(q => (
                                                        <button key={q} onClick={() => setQueue(q)} className={`py-2 px-3 rounded-xl border transition-all text-sm font-medium ${queue === q ? 'border-indigo-400 bg-indigo-50 text-indigo-700' : 'border-slate-200 bg-white text-slate-500'}`}>{q}</button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Số giờ</label>
                                            <div className="relative">
                                                <input type="number" step="0.1" value={hours} onChange={e => setHours(e.target.value)} placeholder="2.5" className="w-full pl-4 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" />
                                                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">giờ</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Nội dung</label>
                                            <textarea value={description} onChange={e => setDescription(e.target.value)} placeholder="Task đã làm..." rows={3} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 resize-none" />
                                        </div>
                                        <button onClick={handleAddReport} disabled={!hours || parseFloat(hours) <= 0} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white font-bold rounded-2xl shadow-lg transition-all">Thêm báo cáo</button>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7">
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden fade-in" style={{animationDelay: '0.3s'}}>
                                    <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Briefcase className="w-5 h-5 text-indigo-600" />Danh sách</h2>
                                        <span className="text-xs font-bold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full uppercase">{reports.length} bản ghi</span>
                                    </div>
                                    <div className="divide-y divide-slate-50 max-h-[600px] overflow-y-auto custom-scrollbar">
                                        {reports.length === 0 ? (
                                            <div className="p-12 text-center text-slate-400 font-medium">Chưa có báo cáo nào.</div>
                                        ) : (
                                            reports.map(report => (
                                                <div key={report.id} className="p-5 hover:bg-slate-50 transition-colors group flex items-start justify-between gap-4">
                                                    <div className="flex gap-4">
                                                        <div className={`mt-1 w-10 h-10 rounded-xl flex items-center justify-center shrink-0 font-bold ${report.jobType === 'GDO' ? 'bg-blue-50 text-blue-600' : 'bg-purple-50 text-purple-600'}`}>{report.jobType[0]}</div>
                                                        <div className="space-y-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-bold text-slate-900">{report.jobType}</span>
                                                                {report.queue !== 'None' && <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded uppercase">{report.queue}</span>}
                                                                <span className="text-xs text-slate-400">• {new Date(report.date).toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'})}</span>
                                                            </div>
                                                            <p className="text-sm text-slate-600">{report.description || '...'}</p>
                                                            <div className="flex items-center gap-3 pt-1">
                                                                <div className="flex items-center gap-1 text-xs font-bold text-slate-500"><Clock className="w-3.5 h-3.5" />{report.hours}h</div>
                                                                <div className="flex items-center gap-1 text-xs font-bold text-emerald-600"><DollarSign className="w-3.5 h-3.5" />${report.totalUsd.toFixed(2)}</div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => deleteReport(report.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all"><Trash2 className="w-4 h-4" /></button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="pt-8 pb-4 text-center text-slate-400 text-xs font-medium">
                            <p>© 2026 Job Report Pro • Tỷ giá cập nhật {lastRateUpdate}: {exchangeRate.toLocaleString()} VNĐ</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
